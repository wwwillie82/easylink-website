name: Deploy site-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: site-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy site-dev
    runs-on: ubuntu-latest

    env:
      PUBLIC_DEPLOY_URL: https://deploy.easylink.hu
      SITE_DEV_DOMAIN: site-dev.easylink.hu
      SITE_DEV_WEBROOT: /var/www/clients/client1/web172/web
      SITE_DEV_SOURCE_ROOT: /var/www/clients/client1/web172/private/easylink-website-src
      SITE_DEV_PRIVATE: /var/www/clients/client1/web172/private
      SITE_DEV_NODE_DIR: /var/www/clients/client1/web172/private/tools/node-v22.12.0-linux-x64/bin
      SITE_DEV_WEB_USER: web172
      SITE_DEV_ADMIN_SUPERVISOR: easylink_site_dev_admin
      SITE_DEV_REPO_URL: https://github.com/wwwillie82/easylink-website.git
      SITE_DEV_ENV_FILE: /var/www/clients/client1/web172/private/site-admin.env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: npm ci

      - name: Generic public renderer smoke
        run: npm run smoke:generic-public-renderer

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Markup smoke on built HTML
        run: npm run smoke:markup

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SITE_DEV_SSH_KEY }}" > ~/.ssh/site_dev_deploy_key
          chmod 600 ~/.ssh/site_dev_deploy_key
          ssh-keyscan -p "${{ secrets.SITE_DEV_SSH_PORT }}" "${{ secrets.SITE_DEV_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync admin source checkout
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/site_dev_deploy_key \
            -p "${{ secrets.SITE_DEV_SSH_PORT }}" \
            -o IdentitiesOnly=yes \
            "${{ secrets.SITE_DEV_SSH_USER }}@${{ secrets.SITE_DEV_SSH_HOST }}" \
            "SITE_DEV_SOURCE_ROOT='${SITE_DEV_SOURCE_ROOT}' SITE_DEV_WEBROOT='${SITE_DEV_WEBROOT}' SITE_DEV_PRIVATE='${SITE_DEV_PRIVATE}' SITE_DEV_ENV_FILE='${SITE_DEV_ENV_FILE}' SITE_DEV_NODE_DIR='${SITE_DEV_NODE_DIR}' SITE_DEV_WEB_USER='${SITE_DEV_WEB_USER}' SITE_DEV_REPO_URL='${SITE_DEV_REPO_URL}' SITE_DEV_DEPLOY_SHA='${GITHUB_SHA}' SITE_DEV_ADMIN_SUPERVISOR='${SITE_DEV_ADMIN_SUPERVISOR}' bash -s" <<'REMOTE'
          set -euo pipefail

          sudo -u "$SITE_DEV_WEB_USER" env \
            HOME="$SITE_DEV_PRIVATE" \
            XDG_CONFIG_HOME="$SITE_DEV_PRIVATE/.config" \
            PATH="$SITE_DEV_NODE_DIR:/usr/local/bin:/usr/bin:/bin" \
            npm_config_cache="$SITE_DEV_PRIVATE/.npm-cache" \
            SITE_DEV_SOURCE_ROOT="$SITE_DEV_SOURCE_ROOT" \
            SITE_DEV_WEBROOT="$SITE_DEV_WEBROOT" \
            SITE_DEV_PRIVATE="$SITE_DEV_PRIVATE" \
            SITE_DEV_ENV_FILE="$SITE_DEV_ENV_FILE" \
            SITE_DEV_REPO_URL="$SITE_DEV_REPO_URL" \
            SITE_DEV_DEPLOY_SHA="$SITE_DEV_DEPLOY_SHA" \
            bash -lc '
              set -euo pipefail
              cd "$SITE_DEV_SOURCE_ROOT"

              echo "--- admin source before"
              git rev-parse HEAD
              git log -1 --oneline
              git status --short

              if [ -n "$(git status --porcelain)" ]; then
                echo "Admin source checkout is dirty; refusing to deploy."
                exit 1
              fi

              git checkout main
              git fetch "$SITE_DEV_REPO_URL" main
              git merge --ff-only FETCH_HEAD

              echo "--- admin source after"
              git rev-parse HEAD
              git log -1 --oneline

              actual_sha="$(git rev-parse HEAD)"
              if [ "$actual_sha" != "$SITE_DEV_DEPLOY_SHA" ]; then
                echo "Admin source HEAD mismatch: expected $SITE_DEV_DEPLOY_SHA, got $actual_sha"
                exit 1
              fi

              echo "--- load site admin environment"
              set -a
              . "$SITE_DEV_ENV_FILE"
              set +a

              echo "--- migrate site-dev database"
              npm run db:migrate

              echo "--- publish current admin DB content to public webroot"
              SITE_ADMIN_ENV_FILE="$SITE_DEV_ENV_FILE" \
              SITE_CONTENT_SOURCE=db \
              SITE_PUBLISH_REPO_DIR="$SITE_DEV_SOURCE_ROOT" \
              SITE_PUBLISH_WEBROOT="$SITE_DEV_WEBROOT" \
              SITE_PUBLISH_RELEASES_DIR="$SITE_DEV_PRIVATE/releases" \
              npm run admin:publish -- "Deploy publish: $SITE_DEV_DEPLOY_SHA"
            '

          supervisorctl restart "$SITE_DEV_ADMIN_SUPERVISOR"
          sleep 3
          supervisorctl status "$SITE_DEV_ADMIN_SUPERVISOR"
          REMOTE

      - name: Smoke test
        run: npm run smoke:live -- "https://${SITE_DEV_DOMAIN}"
