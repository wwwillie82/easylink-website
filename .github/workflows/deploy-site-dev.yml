name: Deploy site-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: site-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy site-dev
    runs-on: ubuntu-latest

    env:
      PUBLIC_DEPLOY_URL: https://deploy.easylink.hu
      SITE_DEV_DOMAIN: site-dev.easylink.hu
      SITE_DEV_WEBROOT: /var/www/clients/client1/web172/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Markup smoke on built HTML
        run: npm run smoke:markup

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SITE_DEV_SSH_KEY }}" > ~/.ssh/site_dev_deploy_key
          chmod 600 ~/.ssh/site_dev_deploy_key
          ssh-keyscan -p "${{ secrets.SITE_DEV_SSH_PORT }}" "${{ secrets.SITE_DEV_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist to site-dev
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='error/' \
            --exclude='stats/' \
            -e "ssh -i ~/.ssh/site_dev_deploy_key -p ${{ secrets.SITE_DEV_SSH_PORT }} -o IdentitiesOnly=yes" \
            dist/ \
            "${{ secrets.SITE_DEV_SSH_USER }}@${{ secrets.SITE_DEV_SSH_HOST }}:${SITE_DEV_WEBROOT}/"

      - name: Fix webroot ownership
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/site_dev_deploy_key \
            -p "${{ secrets.SITE_DEV_SSH_PORT }}" \
            -o IdentitiesOnly=yes \
            "${{ secrets.SITE_DEV_SSH_USER }}@${{ secrets.SITE_DEV_SSH_HOST }}" \
            "chown -R web172:client1 '${SITE_DEV_WEBROOT}'"

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail

          routes=(
            "/"
            "/megoldasaink/"
            "/megoldasaink/penzugy-szamlazas/"
            "/megoldasaink/hr-munkaugy/"
            "/megoldasaink/crm-ugyfelkezeles/"
            "/megoldasaink/dokumentumkezeles-adminisztracio/"
            "/megoldasaink/kontrolling/"
            "/megoldasaink/ai-asszisztens/"
            "/kinek-szol/"
            "/kinek-szol/hotelek-szallashelyek/"
            "/kinek-szol/vendeglatohelyek/"
            "/kinek-szol/szolgaltato-vallalkozasok/"
            "/integraciok/"
            "/arak/"
            "/kapcsolat/"
          )

          for route in "${routes[@]}"; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "https://${SITE_DEV_DOMAIN}${route}")"
            test "$status" = "200"
          done

          check_contains() {
            local route="$1"
            local expected="$2"
            local content
            content="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}${route}")"

            if ! grep -qF "$expected" <<< "$content"; then
              echo "Content smoke failed for ${route}: missing expected pattern: ${expected}" >&2
              return 1
            fi
          }

          check_contains "/" "easyLink ERP"
          check_contains "/" "Cégvezetés, könnyedén."
          check_contains "/" "Demót kérek"
          check_contains "/" "Próbáld ki ingyen"
          check_contains "/" "Átlátható működés"
          check_contains "/" "noindex,nofollow"
          check_contains "/megoldasaink/" "Egy rendszer a napi működés kulcspontjaira"
          check_contains "/megoldasaink/penzugy-szamlazas/" "Pénzügy és számlázás"
          check_contains "/megoldasaink/penzugy-szamlazas/" "Konkrét fókuszok"
          check_contains "/kinek-szol/" "Hoteleknek"
          check_contains "/kinek-szol/" "Vendéglátóhelyeknek"
          check_contains "/integraciok/" "Kapcsolódások, adatáramlás, tisztább működés"
          check_contains "/integraciok/" "NAV Online Számla"
          check_contains "/integraciok/" "Hostware"
          check_contains "/integraciok/" "Cégjelző"
          check_contains "/arak/" "Árazás, ami a működésedhez igazodik"
          check_contains "/arak/" "Demó alapján pontosítunk"
          check_contains "/kapcsolat/" "hello@easylink.hu"
          check_contains "/robots.txt" "Disallow: /"

          npm run smoke:markup -- "https://${SITE_DEV_DOMAIN}"
