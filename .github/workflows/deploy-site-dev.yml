name: Deploy site-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: site-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy site-dev
    runs-on: ubuntu-latest

    env:
      PUBLIC_DEPLOY_URL: https://deploy.easylink.hu
      SITE_DEV_DOMAIN: site-dev.easylink.hu
      SITE_DEV_WEBROOT: /var/www/clients/client1/web172/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Markup smoke on built HTML
        run: npm run smoke:markup

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SITE_DEV_SSH_KEY }}" > ~/.ssh/site_dev_deploy_key
          chmod 600 ~/.ssh/site_dev_deploy_key
          ssh-keyscan -p "${{ secrets.SITE_DEV_SSH_PORT }}" "${{ secrets.SITE_DEV_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist to site-dev
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='error/' \
            --exclude='stats/' \
            -e "ssh -i ~/.ssh/site_dev_deploy_key -p ${{ secrets.SITE_DEV_SSH_PORT }} -o IdentitiesOnly=yes" \
            dist/ \
            "${{ secrets.SITE_DEV_SSH_USER }}@${{ secrets.SITE_DEV_SSH_HOST }}:${SITE_DEV_WEBROOT}/"

      - name: Fix webroot ownership
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/site_dev_deploy_key \
            -p "${{ secrets.SITE_DEV_SSH_PORT }}" \
            -o IdentitiesOnly=yes \
            "${{ secrets.SITE_DEV_SSH_USER }}@${{ secrets.SITE_DEV_SSH_HOST }}" \
            "chown -R web172:client1 '${SITE_DEV_WEBROOT}'"

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail

          routes=(
            "/"
            "/megoldasaink/"
            "/megoldasaink/penzugy-szamlazas/"
            "/megoldasaink/hr-munkaugy/"
            "/megoldasaink/crm-ugyfelkezeles/"
            "/megoldasaink/dokumentumkezeles-adminisztracio/"
            "/megoldasaink/kontrolling/"
            "/megoldasaink/ai-asszisztens/"
            "/kinek-szol/"
            "/kinek-szol/hotelek-szallashelyek/"
            "/kinek-szol/vendeglatohelyek/"
            "/kinek-szol/szolgaltato-vallalkozasok/"
            "/integraciok/"
            "/arak/"
            "/kapcsolat/"
          )

          for route in "${routes[@]}"; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "https://${SITE_DEV_DOMAIN}${route}")"
            test "$status" = "200"
          done

          HOME_HTML="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}/")"
          SOLUTION_DETAIL_HTML="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}/megoldasaink/penzugy-szamlazas/")"
          AUDIENCE_DETAIL_HTML="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}/kinek-szol/hotelek-szallashelyek/")"
          INTEGRATIONS_HTML="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}/integraciok/")"
          PRICING_HTML="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}/arak/")"
          CONTACT_HTML="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}/kapcsolat/")"
          ROBOTS_TXT="$(curl -sS --max-time 20 "https://${SITE_DEV_DOMAIN}/robots.txt")"

          printf '%s' "$HOME_HTML" | grep -F "Cégvezetés, könnyedén"
          printf '%s' "$HOME_HTML" | grep -F "Kérdezz, és a rendszered válaszol"
          printf '%s' "$HOME_HTML" | grep -F "https://deploy.easylink.hu"
          printf '%s' "$HOME_HTML" | grep -F "noindex,nofollow"
          printf '%s' "$SOLUTION_DETAIL_HTML" | grep -F "Mire jó?"
          printf '%s' "$SOLUTION_DETAIL_HTML" | grep -F "Vezetői haszon"
          printf '%s' "$AUDIENCE_DETAIL_HTML" | grep -F "Hostware integrációs irány / előkészítés"
          printf '%s' "$INTEGRATIONS_HTML" | grep -F "NAV Online Számla"
          printf '%s' "$INTEGRATIONS_HTML" | grep -F "kész runtime NAV kapcsolatot"
          printf '%s' "$PRICING_HTML" | grep -F "Csomagárak és árkalkulátor"
          printf '%s' "$CONTACT_HTML" | grep -F "hello@easylink.hu"
          printf '%s' "$ROBOTS_TXT" | grep -F "Disallow: /"

          npm run smoke:markup -- "https://${SITE_DEV_DOMAIN}"
