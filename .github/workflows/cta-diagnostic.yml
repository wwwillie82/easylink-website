name: CTA diagnostic

on:
  push:
    branches:
      - chatgpt/cta-four-buttons-header-toggle

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci --silent
      - name: Capture check output
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          code=$?
          echo "$code" > check.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cta-check-diagnostics
          path: |
            check.log
            check.exit
          if-no-files-found: error
          retention-days: 1
